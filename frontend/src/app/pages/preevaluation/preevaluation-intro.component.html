<app-navbar></app-navbar>

<section class="py-5 bg-light min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow border-0 rounded-4">
          <div class="card-body p-5 text-center">
            <div class="mb-4">
              <span class="badge bg-warning text-dark fs-6 px-3 py-2">Pre-evaluation required</span>
            </div>
            <h1 class="h2 fw-bold mb-3">Welcome</h1>
            <p class="lead text-muted mb-4">
              You must complete a pre-evaluation to determine your English level.
            </p>
            <p class="text-muted small mb-4">
              This includes a short profile questionnaire (not scored) and an adaptive test starting at A1.
            </p>
            @if (error) {
              <div class="alert alert-danger text-start">{{ error }}</div>
            }
            <button
              type="button"
              class="btn btn-primary btn-lg px-5"
              [disabled]="loading"
              (click)="start()"
            >
              @if (loading) {
                <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              }
              Start
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
