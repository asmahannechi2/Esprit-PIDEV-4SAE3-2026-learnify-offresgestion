<div
  class="video-pitch-container"
  [class.video-pitch--fab-pad]="!isRecording && !recordedBlob && !error">
  <div class="header-section text-center mb-4">
    <h2 class="display-5 fw-bold text-gradient">Pitch Vidéo Asynchrone</h2>
    <p class="text-muted">Présentez-vous en moins de 60 secondes pour booster votre candidature !</p>
  </div>

  <div class="main-content">
    <div class="video-card shadow-lg">
      <div class="video-wrapper">
        <video #videoPreview autoplay muted playsinline class="video-preview"></video>
        
        <!-- Overlays -->
        <div *ngIf="isRecording && mediaRecorder?.state === 'recording'" class="recording-badge pulse">
          <span class="dot"></span> ENREGISTREMENT
        </div>
        
        <div *ngIf="isRecording && mediaRecorder?.state === 'recording'" class="timer-badge">
          <i class="bi bi-clock me-1"></i> {{ formattedTime }} / 1:00
        </div>

        <div *ngIf="!isRecording && !recordedBlob && !error" class="overlay-initial text-center text-white">
          <div class="glass-box p-4 rounded-4">
            <i class="bi bi-camera-video display-1 mb-3"></i>
            <h3>Prêt pour votre pitch ?</h3>
            <p>Soyez clair, souriant et direct.</p>
            <p *ngIf="cameraStarting" class="small mb-0 mt-2"><span class="spinner-border spinner-border-sm me-2"></span>Initialisation de la caméra…</p>
          </div>
        </div>

        <!-- Bouton principal toujours visible sur la zone vidéo (évite de devoir scroller vers la barre du bas) -->
        <div *ngIf="!isRecording && !recordedBlob && !error" class="record-cta-bar">
          <button
            type="button"
            (click)="startRecording()"
            class="btn btn-record btn-record--overlay shadow-lg"
            [disabled]="!!error || !cameraReady || cameraStarting">
            <i class="bi bi-circle-fill me-2 pulse-slow"></i>
            {{ cameraStarting ? 'Caméra…' : (!cameraReady ? 'Patience…' : 'Commencer l\'enregistrement') }}
          </button>
        </div>

        <!-- NEW: Processing state if recorder stopped but blob not ready -->
        <div *ngIf="!isRecording && !recordedBlob && mediaRecorder?.state === 'inactive' && chunks.length > 0" class="overlay-initial text-center text-white">
          <div class="glass-box p-4 rounded-4">
            <div class="spinner-border text-light mb-3" role="status"></div>
            <h3>Préparation de votre vidéo...</h3>
          </div>
        </div>

        <div *ngIf="error" class="overlay-error text-center text-white px-3">
          <div class="glass-box-danger p-4 rounded-4">
            <i class="bi bi-exclamation-triangle-fill display-1 mb-3"></i>
            <p>{{ error }}</p>
            <button class="btn btn-outline-light" (click)="startCamera()">Réessayer l'accès</button>
          </div>
        </div>
      </div>

      <div class="controls-section p-4 text-center">
        <!-- Not recording and no video yet (doublon utile si vous scrollez sous la vidéo) -->
        <div *ngIf="!isRecording && !recordedBlob">
          <button
            type="button"
            (click)="startRecording()"
            class="btn btn-record"
            [disabled]="!!error || !cameraReady || cameraStarting">
            <i class="bi bi-circle-fill me-2 pulse-slow"></i>
            {{ cameraStarting ? 'Caméra…' : (!cameraReady ? 'Patience…' : 'Commencer l\'enregistrement') }}
          </button>
        </div>

        <!-- Is recording -->
        <div *ngIf="isRecording">
          <button *ngIf="mediaRecorder?.state === 'recording'" (click)="stopRecording()" class="btn btn-stop shadow">
            <i class="bi bi-stop-fill me-2"></i> Arrêter l'enregistrement
          </button>
          
          <!-- Optional: showing a disabled state while stopping -->
          <button *ngIf="mediaRecorder?.state === 'inactive'" class="btn btn-secondary shadow" disabled>
            <span class="spinner-border spinner-border-sm me-2"></span> Finalisation...
          </button>
        </div>

        <!-- Video recorded, waiting for review/submit -->
        <div *ngIf="recordedBlob && !isRecording" class="d-flex justify-content-center gap-3">
          <button (click)="retake()" class="btn btn-outline-secondary btn-lg rounded-pill px-4" [disabled]="loading">
            <i class="bi bi-arrow-counterclockwise me-2"></i> Recommencer
          </button>
          <button (click)="submitPitch()" class="btn btn-submit btn-lg rounded-pill px-5 shadow" [disabled]="loading">
            <span *ngIf="!loading">
              <i class="bi bi-cloud-arrow-up me-2"></i> Envoyer mon pitch
            </span>
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            <span *ngIf="loading">Envoi en cours...</span>
          </button>
        </div>
      </div>
    </div>

    <div class="footer-actions mt-4 text-center">
      <button (click)="skip()" class="btn btn-link text-decoration-none text-muted" [disabled]="loading">
        Plus tard, je continuerai sans vidéo <i class="bi bi-arrow-right ms-1"></i>
      </button>
    </div>
  </div>

  <!-- Barre fixe écran : ne peut pas être masquée par l’overlay vidéo (même problème de stacking) -->
  <div
    *ngIf="!isRecording && !recordedBlob && !error"
    class="pitch-record-fab"
    aria-live="polite">
    <button
      type="button"
      class="pitch-record-fab__btn"
      (click)="startRecording()"
      [disabled]="!!error || !cameraReady || cameraStarting">
      <span class="pitch-record-fab__dot" aria-hidden="true"></span>
      {{ cameraStarting ? 'Caméra…' : (!cameraReady ? 'Patience…' : 'Commencer l’enregistrement') }}
    </button>
  </div>
</div>
