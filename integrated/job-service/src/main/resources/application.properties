# Copié / adapté depuis Learn/backend/src/main/resources/application.properties
# Microservice job-service : port 8088, JWT, Eureka (non présents dans Learn seul).

spring.application.name=job-service

# Config Server (optionnel — démarrage OK si indisponible)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888



# OpenAPI — /v3/api-docs, /swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# MySQL — base learnify (comme Learn). Surcharge : MYSQL_DATABASE=autre_nom
spring.datasource.url=jdbc:mysql://localhost:3306/${MYSQL_DATABASE:learnify_jobs}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Learn utilise schema.sql + spring.sql.init — ici le schéma est géré par Hibernate (tables job-service).
# Ne pas activer init SQL sans copier aussi schema.sql dans ce module.
spring.sql.init.mode=never

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Serveur (Learn utilise 8082 ; ici 8088 = job-service intégré)
server.port=8088

# Fichiers (CV, pièces jointes)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
file.upload-dir=uploads

# JWT (inter-service, même secret que user-service / autres MS)
jwt.secret=learnifySecretKeyUltraLongueEtTresSecurisee!

# Eureka
eureka.client.service-url.defaultZone=http://${EUREKA_SERVER_HOST:localhost}:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Gmail SMTP (identique Learn — pour envois éventuels depuis ce service)
