spring.application.name=job-service

# Config Server (dťsactivť pour ťviter erreur localhost:8888)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888
spring.cloud.config.enabled=false

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# MySQL (Docker)
spring.datasource.url=jdbc:mysql://mysql-db:3306/learnify_jobs?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# Pas d'init SQL
spring.sql.init.mode=never

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Serveur
server.port=8088

# Upload fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB
file.upload-dir=uploads

# JWT
jwt.secret=learnifySecretKeyUltraLongueEtTresSecurisee!

# Eureka (Docker)
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Monitoring
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bahatechno7@gmail.com
spring.mail.password=fety xqjy cyij qgbe
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true