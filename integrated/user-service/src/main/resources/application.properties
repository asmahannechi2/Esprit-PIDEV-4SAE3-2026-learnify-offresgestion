spring.application.name=user-service
server.port=8087

spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:config-server}:8888
spring.cloud.config.enabled=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

spring.datasource.url=jdbc:mysql://mysql-db:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from=wwiem7653@gmail.com

webauthn.rpId=localhost
webauthn.rpName=learnify
webauthn.origin=http://localhost:4200

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8087/login/oauth2/code/google}
server.forward-headers-strategy=framework

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

app.oauth2-redirect-base=${APP_OAUTH2_REDIRECT_BASE:http://localhost:4200}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

app.skip-device-confirmation=true
app.security.log-unblock-pin-in-dev=${APP_LOG_UNBLOCK_PIN:false}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
