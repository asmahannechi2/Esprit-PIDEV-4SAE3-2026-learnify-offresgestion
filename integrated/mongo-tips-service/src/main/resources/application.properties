spring.application.name=mongo-tips-service
server.port=8090

# MongoDB Atlas (ou local). Ne jamais committer le mot de passe : utiliser une variable d'environnement.
# Exemple Windows PowerShell : $env:MONGODB_URI="mongodb+srv://USER:PASS@cluster.../tips_db?retryWrites=true&w=majority"
# La chaîne doit inclure le nom de la base (ex. /tips_db) et souvent ?retryWrites=true&w=majority
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/tips_db}

management.endpoints.web.exposure.include=health,info

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
