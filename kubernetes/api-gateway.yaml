apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pidev
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: wiwi2003/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8060
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: EUREKA_SERVER_HOST
          value: "eureka-server"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka/"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8060
          initialDelaySeconds: 180
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8060
          initialDelaySeconds: 150
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pidev
  labels:
    app: api-gateway
spec:
  type: NodePort
  ports:
  - port: 8060
    targetPort: 8060
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: api-gateway
