apiVersion: v1
kind: Service
metadata:
  name: application-service
spec:
  ports:
    - port: 8089
      targetPort: 8089
  selector:
    app: application-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      containers:
        - name: application-service
          image: application-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8089
          resources:
            limits:
              memory: "400Mi"
            requests:
              memory: "256Mi"
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-db:3306/learnify_applications?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
---
apiVersion: v1
kind: Service
metadata:
  name: job-service
spec:
  ports:
    - port: 8088
      targetPort: 8088
  selector:
    app: job-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-service
  template:
    metadata:
      labels:
        app: job-service
    spec:
      containers:
        - name: job-service
          image: job-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8088
          resources:
            limits:
              memory: "400Mi"
            requests:
              memory: "256Mi"
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql-db:3306/learnify_jobs?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              value: root
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://eureka-server:8761/eureka/
